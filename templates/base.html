<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="google-site-verification" content="Hbo-dCNT1hnwZVY5xVA6eTIRZxVzTtCQd1_wgZVHAQ8" />
    <title>{% block title %}Smart Farming Assistant{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    
    <!-- Theme Script - Must run BEFORE CSS to prevent flash -->
    <script>
        // Apply saved theme immediately before page renders
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    
    <!-- Font Awesome Icons (Local) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome-free-6.5.1-web/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <!-- Universal Mobile Responsive Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    <!-- Chart.js for data visualization (CDN fallback) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Theme Toggle -->
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}" defer></script>
    <!-- Mobile Navigation -->
    <script src="{{ url_for('static', filename='js/mobile-nav.js') }}" defer></script>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    {% block styles %}{% endblock %}

</head>

<body>
    {% if not user_logged_in %}
    {% include 'navbar.html' %}
    {% endif %}

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Flash Messages Data Island -->
    <script id="flash-messages" type="application/json">
        {{ get_flashed_messages(with_categories=true) | tojson }}
    </script>

    <script>
        // Use the data island to display flash messages as toasts
        document.addEventListener('DOMContentLoaded', function () {
            const flashData = document.getElementById('flash-messages');
            if (flashData && window.showToast) {
                try {
                    const messages = JSON.parse(flashData.textContent);
                    messages.forEach(([category, message]) => {
                        window.showToast(message, category);
                    });
                } catch (e) {
                    console.error('Error parsing flash messages:', e);
                }
            }
        });
    </script>


    {% if user_logged_in %}
    {% include 'includes/global_modals.html' %}
    <script src="{{ url_for('static', filename='js/global_modals.js') }}"></script>
    {% endif %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
