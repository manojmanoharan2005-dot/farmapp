{% extends "base.html" %}

{% block title %}Verify OTP - Smart Farming Assistant{% endblock %}

{% block content %}
<style>
    .verify-otp-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px 2rem 60px;
        background: var(--gradient-bg);
    }

    .verify-otp-container {
        width: 100%;
        max-width: 480px;
        position: relative;
        z-index: 1;
    }

    .verify-otp-card {
        background: var(--bg-white);
        border-radius: 24px;
        padding: 48px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-xl);
    }

    .verify-otp-header {
        text-align: center;
        margin-bottom: 36px;
    }

    .verify-otp-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border-radius: 20px;
        margin-bottom: 24px;
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .verify-otp-icon i {
        font-size: 36px;
        color: #fff;
    }

    .verify-otp-title {
        font-size: 1.85rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 12px;
    }

    .verify-otp-subtitle {
        color: var(--text-secondary);
        font-size: 0.95rem;
        line-height: 1.6;
    }

    .verify-otp-email {
        color: var(--primary);
        font-weight: 600;
    }

    .otp-form-group {
        margin-bottom: 24px;
    }

    .otp-label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-primary);
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 12px;
    }

    .otp-label i {
        color: var(--primary);
    }

    .otp-input {
        width: 100%;
        padding: 18px 20px;
        background: var(--bg-white);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 1.8rem;
        font-weight: 600;
        letter-spacing: 12px;
        text-align: center;
        transition: var(--transition);
        outline: none;
    }

    .otp-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
    }

    [data-theme="dark"] .otp-input:focus {
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
    }

    .otp-timer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: var(--bg-secondary);
        border-radius: 10px;
    }

    .otp-timer {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
        font-size: 0.9rem;
        font-weight: 500;
    }

    .otp-timer i {
        color: var(--primary);
    }

    .otp-timer-value {
        font-weight: 600;
        color: var(--text-primary);
    }

    .otp-resend-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: not-allowed;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 6px;
    }

    .otp-resend-btn:not(:disabled) {
        color: var(--primary);
        cursor: pointer;
    }

    .otp-resend-btn:not(:disabled):hover {
        background: rgba(34, 197, 94, 0.1);
    }

    .btn-verify {
        width: 100%;
        padding: 16px 24px;
        background: var(--gradient-primary);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
    }

    .btn-verify:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
    }

    .btn-verify:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .verify-otp-footer {
        text-align: center;
        margin-top: 28px;
        padding-top: 24px;
        border-top: 1px solid var(--border-color);
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    .verify-otp-footer a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
    }

    .verify-otp-footer a:hover {
        text-decoration: underline;
    }

    .alert-box {
        padding: 14px 16px;
        margin-bottom: 20px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slideDown 0.3s ease;
    }

    .alert-success {
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #6ee7b7;
    }

    [data-theme="dark"] .alert-success {
        background: #1a3d2e;
        color: #6ee7b7;
        border-color: #065f46;
    }

    .alert-error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
    }

    [data-theme="dark"] .alert-error {
        background: #451a1a;
        color: #fca5a5;
        border-color: #991b1b;
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 576px) {
        .verify-otp-card {
            padding: 32px 24px;
        }
        
        .otp-input {
            font-size: 1.5rem;
            letter-spacing: 8px;
            padding: 16px;
        }

        .verify-otp-title {
            font-size: 1.5rem;
        }
    }
</style>

<section class="verify-otp-section">
    <div class="verify-otp-container">
        <div class="verify-otp-card">
            
            <!-- Header -->
            <div class="verify-otp-header">
                <div class="verify-otp-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h2 class="verify-otp-title">Verify OTP</h2>
                <p class="verify-otp-subtitle">
                    Enter the 6-digit code sent to<br>
                    <span class="verify-otp-email">{{ identifier }}</span>
                </p>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- OTP Verification Form -->
            <form id="verifyOtpForm">
                
                <!-- OTP Input -->
                <div class="otp-form-group">
                    <label for="otpInput" class="otp-label">
                        <i class="fas fa-key"></i> Enter OTP
                    </label>
                    <input 
                        type="text" 
                        id="otpInput" 
                        name="otp" 
                        class="otp-input" 
                        placeholder="000000"
                        maxlength="6" 
                        pattern="[0-9]{6}" 
                        required 
                        autocomplete="off"
                        inputmode="numeric">
                </div>

                <!-- Timer and Resend -->
                <div class="otp-timer-row">
                    <div class="otp-timer">
                        <i class="fas fa-clock"></i>
                        <span>Expires in:</span>
                        <span class="otp-timer-value" id="timer">03:00</span>
                    </div>
                    <button type="button" id="resendBtn" class="otp-resend-btn" disabled>
                        <i class="fas fa-redo-alt"></i> Resend
                    </button>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="btn-verify">
                    <span id="btnText">
                        <i class="fas fa-check-circle"></i> Verify OTP
                    </span>
                </button>

            </form>

            <!-- Footer -->
            <div class="verify-otp-footer">
                Wrong details?
                <a href="{{ url_for('forgot_password.forgot_password_page') }}">Go Back</a>
            </div>

        </div>
    </div>
</section>

<script>
    const identifier = "{{ identifier }}";
    let timeLeft = 180; // 3 minutes in seconds
    let timerInterval;

    // Auto-format OTP input to only accept numbers
    document.getElementById('otpInput').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });

    // Start countdown timer
    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;

            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;

            document.getElementById('timer').textContent =
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.querySelector('.otp-timer').innerHTML =
                    '<i class="fas fa-exclamation-circle" style="color: var(--danger);"></i> <span style="color: var(--danger);">OTP Expired</span>';
                enableResendButton();
            }
        }, 1000);
    }

    function enableResendButton() {
        const resendBtn = document.getElementById('resendBtn');
        resendBtn.disabled = false;
    }

    async function resendOTP() {
        const resendBtn = document.getElementById('resendBtn');
        resendBtn.disabled = true;
        resendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

        try {
            const response = await fetch('/api/forgot-password/request-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: identifier })
            });

            const data = await response.json();

            if (data.success) {
                showAlert('New OTP sent successfully!', 'success');

                // Reset timer
                clearInterval(timerInterval);
                timeLeft = 180;
                startTimer();

                resendBtn.innerHTML = '<i class="fas fa-redo-alt"></i> Resend';
            } else {
                showAlert(data.message, 'error');
                resendBtn.disabled = false;
                resendBtn.innerHTML = '<i class="fas fa-redo-alt"></i> Resend';
            }

        } catch (error) {
            showAlert('Failed to resend OTP. Please try again.', 'error');
            resendBtn.disabled = false;
            resendBtn.innerHTML = '<i class="fas fa-redo-alt"></i> Resend';
        }
    }

    // Add onclick to resend button
    document.getElementById('resendBtn').addEventListener('click', resendOTP);

    document.getElementById('verifyOtpForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const otp = document.getElementById('otpInput').value.trim();
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        // Validate OTP
        if (!/^\d{6}$/.test(otp)) {
            showAlert('Please enter a valid 6-digit OTP', 'error');
            return;
        }

        // Disable button and show loading
        submitBtn.disabled = true;
        btnText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

        try {
            const response = await fetch('/api/forgot-password/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: identifier, otp: otp })
            });

            const data = await response.json();

            if (data.success) {
                showAlert(data.message, 'success');
                clearInterval(timerInterval);

                // Redirect to password reset page
                setTimeout(() => {
                    window.location.href = data.redirect_url;
                }, 1500);
            } else {
                showAlert(data.message, 'error');
                submitBtn.disabled = false;
                btnText.innerHTML = '<i class="fas fa-check-circle"></i> Verify OTP';
                document.getElementById('otpInput').value = '';
                document.getElementById('otpInput').focus();
            }

        } catch (error) {
            console.error('Error:', error);
            showAlert('Network error. Please try again.', 'error');
            submitBtn.disabled = false;
            btnText.innerHTML = '<i class="fas fa-check-circle"></i> Verify OTP';
        }
    });

    function showAlert(message, type) {
        const alertContainer = document.getElementById('alertContainer');
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
        const alertClass = type === 'success' ? 'alert-success' : 'alert-error';

        alertContainer.innerHTML = `
            <div class="alert-box ${alertClass}">
                <i class="fas ${icon}" style="font-size: 18px;"></i>
                <span>${message}</span>
            </div>
        `;

        setTimeout(() => {
            alertContainer.innerHTML = '';
        }, 5000);
    }

    // Auto-focus OTP input and start timer on page load
    document.getElementById('otpInput').focus();
    startTimer();
</script>
{% endblock %}
