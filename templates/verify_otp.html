{% extends "base.html" %}

{% block title %}Verify OTP - Smart Farming Assistant{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<style>
    .verify-otp-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px 2rem 60px;
        background: var(--gradient-bg);
    }

    .verify-otp-container {
        width: 100%;
        max-width: 480px;
        position: relative;
        z-index: 1;
    }

    .verify-otp-card {
        background: var(--bg-white);
        border-radius: 24px;
        padding: 48px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-xl);
    }

    .verify-otp-header {
        text-align: center;
        margin-bottom: 36px;
    }

    .verify-otp-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border-radius: 20px;
        margin-bottom: 24px;
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .verify-otp-icon i {
        font-size: 36px;
        color: #fff;
    }

    .verify-otp-title {
        font-size: 1.85rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 12px;
    }

    .verify-otp-subtitle {
        color: var(--text-secondary);
        font-size: 0.95rem;
        line-height: 1.6;
    }

    .verify-otp-email {
        color: var(--primary);
        font-weight: 600;
    }

    .otp-form-group {
        margin-bottom: 24px;
    }

    .otp-label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-primary);
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 12px;
    }

    .otp-label i {
        color: var(--primary);
    }

    .otp-input {
        width: 100%;
        padding: 18px 20px;
        background: var(--bg-white);
        border: 2px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 1.8rem;
        font-weight: 600;
        letter-spacing: 12px;
        text-align: center;
        transition: var(--transition);
        outline: none;
    }

    .otp-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
    }

    [data-theme="dark"] .otp-input:focus {
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
    }

    .otp-timer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding: 12px 16px;
        background: var(--bg-secondary);
        border-radius: 10px;
    }

    .otp-timer {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
        font-size: 0.9rem;
        font-weight: 500;
    }

    .otp-timer i {
        color: var(--primary);
    }

    .otp-timer-value {
        font-weight: 600;
        color: var(--text-primary);
    }

    .otp-resend-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: not-allowed;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 6px;
    }

    .otp-resend-btn:not(:disabled) {
        color: var(--primary);
        cursor: pointer;
    }

    .otp-resend-btn:not(:disabled):hover {
        background: rgba(34, 197, 94, 0.1);
    }

    .btn-verify {
        width: 100%;
        padding: 16px 24px;
        background: var(--gradient-primary);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
    }

    .btn-verify:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
    }

    .btn-verify:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .verify-otp-footer {
        text-align: center;
        margin-top: 28px;
        padding-top: 24px;
        border-top: 1px solid var(--border-color);
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    .verify-otp-footer a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
    }

    .verify-otp-footer a:hover {
        text-decoration: underline;
    }

    .alert-box {
        padding: 14px 16px;
        margin-bottom: 20px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slideDown 0.3s ease;
    }

    .alert-success {
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #6ee7b7;
    }

    [data-theme="dark"] .alert-success {
        background: #1a3d2e;
        color: #6ee7b7;
        border-color: #065f46;
    }

    .alert-error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
    }

    [data-theme="dark"] .alert-error {
        background: #451a1a;
        color: #fca5a5;
        border-color: #991b1b;
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<section class="verify-otp-section">
    <div class="verify-otp-container">
        <div class="verify-otp-card">
            
            <!-- Header -->
            <div class="verify-otp-header">
                <div class="verify-otp-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h2 class="verify-otp-title">Verify OTP</h2>
                <p class="verify-otp-subtitle">
                    Enter the 6-digit code sent to<br>
                    <span class="verify-otp-email">{{ identifier }}</span>
                </p>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- OTP Verification Form -->
            <form id="verifyOtpForm">
                
                <!-- OTP Input -->
                <div class="otp-form-group">
                    <label for="otpInput" class="otp-label">
                        <i class="fas fa-key"></i> Enter OTP
                    </label>
                    <input 
                        type="text" 
                        id="otpInput" 
                        name="otp" 
                        class="otp-input" 
                        placeholder="000000"
                        maxlength="6" 
                        pattern="[0-9]{6}" 
                        required 
                        autocomplete="off"
                        inputmode="numeric">
                </div>

                <!-- Timer and Resend -->
                <div class="otp-timer-row">
                    <div class="otp-timer">
                        <i class="fas fa-clock"></i>
                        <span>Expires in:</span>
                        <span class="otp-timer-value" id="timer">03:00</span>
                    </div>
                    <button type="button" id="resendBtn" class="otp-resend-btn" disabled>
                        <i class="fas fa-redo-alt"></i> Resend
                    </button>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="btn-verify">
                    <span id="btnText">
                        <i class="fas fa-check-circle"></i> Verify OTP
                    </span>
                </button>

            </form>

            <!-- Footer -->
            <div class="verify-otp-footer">
                Wrong details?
                <a href="{{ url_for('forgot_password.forgot_password_page') }}">Go Back</a>
            </div>

        </div>
    </div>
</section>

<div id="otp-config" data-identifier="{{ identifier }}" style="display:none;"></div>
<script src="{{ url_for('static', filename='js/verify_otp.js') }}"></script>
{% endblock %}
